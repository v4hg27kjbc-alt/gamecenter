<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>民航客机收藏馆 | Airliner Collection</title>
<script defer src="https://cloud.umami.is/script.js" data-website-id="1b107f5a-12d4-4db7-a8bd-c1d9cd2ecbb7"></script>
<style>
:root {
  --glass-bg: rgba(255, 255, 255, 0.07);
  --glass-border: rgba(255, 255, 255, 0.13);
  --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
  --accent: #4fc3f7;
  --accent-glow: rgba(79, 195, 247, 0.45);
  --text: #e0e0e0;
  --text-dim: #9e9e9e;
  --card-hover-bg: rgba(255, 255, 255, 0.11);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: linear-gradient(160deg, #0a1220 0%, #0e1a2e 35%, #162840 65%, #0c1628 100%);
  background-attachment: fixed;
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
}

.stars-layer {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.star {
  position: absolute; background: white; border-radius: 50%;
  animation: twinkle var(--dur) ease-in-out infinite;
  animation-delay: var(--delay);
}
@keyframes twinkle {
  0%, 100% { opacity: 0.15; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.9); }
}

.app-container {
  position: relative; z-index: 1;
  max-width: 1340px; margin: 0 auto; padding: 36px 20px 60px;
}

.header {
  backdrop-filter: blur(22px) saturate(180%);
  -webkit-backdrop-filter: blur(22px) saturate(180%);
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 40px 40px 32px;
  margin-bottom: 32px;
  box-shadow: var(--glass-shadow);
  text-align: center;
  animation: headerSlideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes headerSlideIn {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}
.header h1 {
  font-size: 2.8rem; font-weight: 700;
  background: linear-gradient(135deg, #e3f2fd, #81d4fa, #e3f2fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px; margin-bottom: 6px;
}
.header .subtitle {
  color: var(--text-dim); font-size: 0.9rem;
  letter-spacing: 5px; text-transform: uppercase;
}

.filter-bar {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-bottom: 14px; justify-content: center; align-items: center;
}
.filter-chip {
  backdrop-filter: blur(10px) saturate(180%);
  -webkit-backdrop-filter: blur(10px) saturate(180%);
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 50px;
  padding: 9px 22px;
  color: var(--text); cursor: pointer; font-size: 0.88rem;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  user-select: none; white-space: nowrap;
}
.filter-chip:hover {
  background: rgba(255,255,255,0.14);
  border-color: rgba(255,255,255,0.28);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(0,0,0,0.3);
}
.filter-chip.active {
  background: rgba(79, 195, 247, 0.22);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 0 22px var(--accent-glow);
}

.airline-country-bar {
  display: none;
  flex-wrap: wrap; gap: 8px; justify-content: center;
  margin-bottom: 24px; padding: 16px 20px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  animation: fadeDown 0.4s ease;
}
.airline-country-bar.visible { display: flex; }
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
.country-chip {
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 40px;
  padding: 7px 18px;
  color: var(--text-dim); cursor: pointer;
  font-size: 0.82rem;
  transition: all 0.3s ease; user-select: none;
}
.country-chip:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
.country-chip.active {
  background: rgba(79, 195, 247, 0.18);
  border-color: var(--accent);
  color: var(--accent);
}

.collection-count {
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 50px;
  padding: 9px 22px;
  color: var(--text-dim); font-size: 0.88rem;
  margin-left: auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 26px;
}

.card {
  backdrop-filter: blur(18px) saturate(180%);
  -webkit-backdrop-filter: blur(18px) saturate(180%);
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  overflow: hidden; cursor: pointer;
  transition: all 0.45s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
  animation: cardFadeIn 0.6s ease backwards;
  animation-delay: calc(var(--i) * 0.07s);
  display: flex; flex-direction: column;
}
@keyframes cardFadeIn {
  from { opacity: 0; transform: translateY(36px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.card:hover {
  transform: translateY(-7px) scale(1.015);
  background: var(--card-hover-bg);
  border-color: rgba(255,255,255,0.32);
  box-shadow: 0 14px 44px rgba(0, 0, 0, 0.4), 0 0 28px var(--accent-glow);
}
.card:active { transform: scale(0.97); }

.card-image-wrap {
  position: relative; width: 100%; height: 200px; overflow: hidden;
  background: linear-gradient(180deg, rgba(10,18,36,0.3), rgba(10,18,36,0.85));
}
.card-image-wrap img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.card:hover .card-image-wrap img { transform: scale(1.07); }
.card-image-wrap::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 55px;
  background: linear-gradient(transparent, rgba(10, 16, 26, 0.92));
}

.card-airlines-mini {
  position: absolute; bottom: 10px; left: 14px; display: flex; gap: 6px; z-index: 2;
}
.airline-mini-logo {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.3);
  backdrop-filter: blur(6px);
  background: rgba(0,0,0,0.4);
  object-fit: contain; padding: 2px;
}

.card-badge {
  position: absolute; top: 12px; right: 12px;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 3px 12px;
  font-size: 0.73rem; color: #ffd54f;
  letter-spacing: 1px; font-weight: 600; z-index: 2;
}
.card-bookmark {
  position: absolute; top: 12px; left: 12px; z-index: 3;
  width: 34px; height: 34px;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.3s ease;
}
.card-bookmark.collected {
  background: rgba(255, 87, 34, 0.55);
  border-color: #ff5722;
  box-shadow: 0 0 14px rgba(255, 87, 34, 0.5);
}
.card-bookmark svg { width: 17px; height: 17px; fill: none; stroke: white; stroke-width: 2; }
.card-bookmark.collected svg { fill: #ff5722; stroke: #ff5722; }

.card-body { padding: 18px 20px 20px; flex: 1; display: flex; flex-direction: column; }
.card-body h3 {
  font-size: 1.25rem; font-weight: 700; margin-bottom: 4px;
  color: #fff; letter-spacing: 0.5px;
}
.card-body .model-code {
  font-size: 0.78rem; color: var(--accent); font-weight: 600;
  letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase;
}
.card-body .desc {
  font-size: 0.85rem; color: var(--text-dim); line-height: 1.55; flex: 1;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-stats {
  display: flex; gap: 16px; margin-top: 12px; padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.card-stats .stat { flex: 1; text-align: center; }
.stat-value { font-size: 0.95rem; font-weight: 700; color: #fff; }
.stat-label { font-size: 0.68rem; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }

.overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  display: flex; align-items: center; justify-content: center;
  animation: overlayIn 0.28s ease;
}
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
.detail-modal {
  backdrop-filter: blur(26px) saturate(180%);
  -webkit-backdrop-filter: blur(26px) saturate(180%);
  background: rgba(18, 28, 46, 0.78);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  width: 92%; max-width: 760px; max-height: 88vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 40px var(--accent-glow);
  animation: modalSlideIn 0.45s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes modalSlideIn {
  from { opacity: 0; transform: translateY(36px) scale(0.92); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-header-img { position: relative; }
.modal-header-img img {
  width: 100%; height: 260px; object-fit: cover;
  border-radius: 28px 28px 0 0;
}
.modal-close {
  position: absolute; top: 16px; right: 16px;
  width: 38px; height: 38px;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 50%;
  color: white; font-size: 1.2rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s ease; z-index: 2;
}
.modal-close:hover { background: rgba(255,255,255,0.18); transform: rotate(90deg); }
.modal-body { padding: 26px 30px 34px; }
.modal-body h2 { font-size: 1.7rem; color: #fff; margin-bottom: 3px; }
.modal-code { color: var(--accent); font-size: 0.82rem; letter-spacing: 2px; margin-bottom: 14px; }
.modal-desc { color: #ccc; line-height: 1.75; font-size: 0.93rem; margin-bottom: 20px; }
.modal-specs {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px;
}
.spec-item {
  backdrop-filter: blur(8px);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 13px;
  padding: 12px 16px;
}
.spec-label { font-size: 0.68rem; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
.spec-value { font-size: 1.05rem; color: #fff; font-weight: 700; margin-top: 2px; }

.airlines-section { margin-top: 4px; }
.airlines-section h3 {
  font-size: 1rem; color: var(--accent); margin-bottom: 14px;
  letter-spacing: 1px; display: flex; align-items: center; gap: 8px;
}
.airlines-section h3::after {
  content: ''; flex: 1; height: 1px;
  background: rgba(255,255,255,0.08);
}
.airline-card {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px;
  padding: 16px 18px; margin-bottom: 12px;
  display: flex; gap: 16px; align-items: flex-start;
  transition: all 0.3s ease;
}
.airline-card:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.18);
}
.airline-card:last-child { margin-bottom: 0; }
.airline-logo {
  width: 52px; height: 52px; border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.12);
  object-fit: contain; padding: 4px;
  background: rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.airline-info { flex: 1; min-width: 0; }
.airline-name {
  font-size: 1rem; font-weight: 700; color: #fff;
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 4px;
}
.airline-country-tag {
  font-size: 0.7rem; font-weight: 500;
  background: rgba(79, 195, 247, 0.15);
  color: var(--accent);
  border-radius: 10px;
  padding: 2px 10px;
}
.airline-desc {
  font-size: 0.82rem; color: var(--text-dim); line-height: 1.5;
  margin-bottom: 10px;
}
.airline-website {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.8rem; color: var(--accent);
  text-decoration: none;
  backdrop-filter: blur(6px);
  background: rgba(79, 195, 247, 0.1);
  border: 1px solid rgba(79, 195, 247, 0.25);
  border-radius: 20px;
  padding: 6px 16px;
  transition: all 0.3s ease;
  cursor: pointer;
}
.airline-website:hover {
  background: rgba(79, 195, 247, 0.22);
  border-color: var(--accent);
  box-shadow: 0 0 16px var(--accent-glow);
  transform: translateY(-1px);
}
.airline-website svg { width: 13px; height: 13px; }

@media (max-width: 768px) {
  .header { padding: 28px 18px; }
  .header h1 { font-size: 1.9rem; }
  .grid { grid-template-columns: 1fr; gap: 18px; }
  .detail-modal { width: 96%; max-height: 92vh; }
  .modal-specs { grid-template-columns: 1fr; }
  .airline-card { flex-direction: column; align-items: center; text-align: center; }
  .airline-logo { width: 44px; height: 44px; }
}
.announcement-toast {
  position: fixed; top: -80px; left: 50%; transform: translateX(-50%); z-index: 200;
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  background: rgba(79, 195, 247, 0.18);
  border: 1px solid rgba(79, 195, 247, 0.35);
  border-radius: 16px;
  padding: 14px 28px;
  color: #fff; font-size: 0.9rem; font-weight: 600;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 20px rgba(79, 195, 247, 0.3);
  display: flex; align-items: center; gap: 10px;
  transition: top 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  white-space: nowrap;
}
.announcement-toast.show { top: 24px; }
.announcement-toast .toast-icon {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(79, 195, 247, 0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
}
.announcement-toast .toast-close {
  margin-left: 8px; cursor: pointer;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; border: none; color: #fff;
  transition: background 0.3s;
}
.announcement-toast .toast-close:hover { background: rgba(255,255,255,0.25); }

/* ===== 搜索栏 ===== */
.search-sort-row {
  display: flex; gap: 12px; flex-wrap: wrap;
  margin-bottom: 16px; align-items: center; justify-content: center;
}
.search-wrap {
  position: relative; flex: 1; min-width: 220px; max-width: 400px;
}
.search-wrap svg {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  width: 17px; height: 17px; stroke: var(--text-dim); fill: none; stroke-width: 2;
  pointer-events: none; transition: stroke 0.3s;
}
.search-input {
  width: 100%; padding: 11px 18px 11px 44px;
  backdrop-filter: blur(12px) saturate(180%);
  -webkit-backdrop-filter: blur(12px) saturate(180%);
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 50px;
  color: #fff; font-size: 0.88rem; outline: none;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  font-family: inherit;
}
.search-input::placeholder { color: var(--text-dim); }
.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 22px var(--accent-glow);
  background: rgba(255,255,255,0.11);
}
.search-input:focus + svg,
.search-wrap:focus-within svg { stroke: var(--accent); }
.search-clear {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(255,255,255,0.1); border: none; color: var(--text-dim);
  cursor: pointer; font-size: 0.8rem; display: none;
  align-items: center; justify-content: center; transition: all 0.3s;
}
.search-clear.visible { display: flex; }
.search-clear:hover { background: rgba(255,255,255,0.2); color: #fff; }
.search-results-hint {
  color: var(--text-dim); font-size: 0.78rem; text-align: center;
  margin-bottom: 14px; display: none;
}

/* ===== 排序按钮组 ===== */
.sort-group {
  display: flex; gap: 6px; flex-shrink: 0;
}
.sort-chip {
  backdrop-filter: blur(10px) saturate(180%);
  -webkit-backdrop-filter: blur(10px) saturate(180%);
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 50px;
  padding: 8px 16px;
  color: var(--text-dim); cursor: pointer; font-size: 0.78rem;
  transition: all 0.3s ease; user-select: none; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}
.sort-chip:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
.sort-chip.active {
  background: rgba(79, 195, 247, 0.18);
  border-color: var(--accent); color: var(--accent);
}
.sort-arrow { font-size: 0.65rem; transition: transform 0.3s; display: inline-block; }
.sort-chip.desc .sort-arrow { transform: rotate(180deg); }

/* ===== 卡片对比复选框 ===== */
.card-compare-check {
  position: absolute; top: 12px; right: 52px; z-index: 3;
  width: 28px; height: 28px;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.4);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.3s ease; opacity: 0; transform: scale(0.8);
}
.card:hover .card-compare-check,
.card-compare-check.checked { opacity: 1; transform: scale(1); }
.card-compare-check.checked {
  background: rgba(79, 195, 247, 0.3);
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--accent-glow);
}
.card-compare-check svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2.5; }
.card-compare-check.checked svg { fill: var(--accent); stroke: var(--accent); }

/* ===== 对比面板 ===== */
.compare-bar {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 90;
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  background: rgba(18, 28, 46, 0.85);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 14px 24px;
  display: none; align-items: center; gap: 16px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 24px var(--accent-glow);
  animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
.compare-bar.visible { display: flex; }
@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.compare-bar .compare-slot {
  backdrop-filter: blur(8px);
  background: rgba(255,255,255,0.05);
  border: 1px dashed rgba(255,255,255,0.18);
  border-radius: 12px;
  padding: 8px 16px;
  font-size: 0.82rem; color: var(--text-dim);
  min-width: 140px; text-align: center;
}
.compare-bar .compare-slot.filled {
  border-style: solid; border-color: var(--accent);
  background: rgba(79, 195, 247, 0.1);
  color: #fff; font-weight: 600;
}
.compare-bar .compare-vs { color: var(--accent); font-weight: 700; font-size: 0.9rem; }
.compare-bar .compare-btn {
  backdrop-filter: blur(8px);
  background: rgba(79, 195, 247, 0.2);
  border: 1px solid var(--accent);
  border-radius: 50px;
  padding: 8px 22px; color: #fff; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; transition: all 0.3s ease; white-space: nowrap;
}
.compare-bar .compare-btn:hover:not(:disabled) {
  background: rgba(79, 195, 247, 0.35);
  box-shadow: 0 0 18px var(--accent-glow);
}
.compare-bar .compare-btn:disabled { opacity: 0.35; cursor: default; }
.compare-bar .compare-clear {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 0.8rem; transition: color 0.3s;
}
.compare-bar .compare-clear:hover { color: #ff5252; }

/* ===== 对比模态 ===== */
.compare-modal {
  backdrop-filter: blur(26px) saturate(180%);
  -webkit-backdrop-filter: blur(26px) saturate(180%);
  background: rgba(18, 28, 46, 0.82);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  width: 94%; max-width: 900px; max-height: 88vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 40px var(--accent-glow);
  animation: modalSlideIn 0.45s cubic-bezier(0.16, 1, 0.3, 1);
}
.compare-modal .compare-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 28px; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.compare-modal .compare-header h2 { color: #fff; font-size: 1.3rem; }
.compare-modal .compare-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0;
}
.compare-col {
  padding: 24px 28px;
}
.compare-col:first-child { border-right: 1px solid rgba(255,255,255,0.06); }
.compare-col .compare-img {
  width: 100%; height: 180px; object-fit: cover; border-radius: 14px;
  margin-bottom: 16px;
}
.compare-col h3 { color: #fff; font-size: 1.15rem; margin-bottom: 4px; }
.compare-col .compare-code { color: var(--accent); font-size: 0.78rem; letter-spacing: 2px; margin-bottom: 10px; }
.compare-col .compare-desc { color: var(--text-dim); font-size: 0.83rem; line-height: 1.55; margin-bottom: 14px; }
.compare-spec-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.compare-spec-row .spec-label { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
.compare-spec-row .spec-value { font-size: 0.95rem; color: #fff; font-weight: 700; }
.compare-spec-row .spec-value.better { color: #69f0ae; }

/* ===== 骨架屏 ===== */
.skeleton-img {
  position: absolute; inset: 0; z-index: 5;
  background: linear-gradient(180deg, rgba(10,18,36,0.5), rgba(10,18,36,0.9));
  overflow: hidden;
}
.skeleton-img::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
  animation: shimmer 1.6s ease-in-out infinite;
}
@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}
.skeleton-img.hidden { display: none; }
.card-image-wrap img.loaded { opacity: 1; }
.card-image-wrap img {
  opacity: 0; transition: opacity 0.5s ease;
}

/* ===== 3D 倾斜效果 ===== */
.card.tilt-active {
  transition: transform 0.1s ease-out, background 0.45s cubic-bezier(0.16, 1, 0.3, 1),
              border-color 0.45s, box-shadow 0.45s;
  transform-style: preserve-3d;
  perspective: 800px;
}
.card.tilt-active:hover { transform: none; }
.card.tilt-active .card-image-wrap,
.card.tilt-active .card-body {
  transform-style: preserve-3d;
}

/* ===== 返回顶部按钮 ===== */
.back-to-top {
  position: fixed; bottom: 32px; right: 28px; z-index: 80;
  width: 46px; height: 46px;
  backdrop-filter: blur(14px) saturate(180%);
  -webkit-backdrop-filter: blur(14px) saturate(180%);
  background: rgba(79, 195, 247, 0.15);
  border: 1px solid rgba(79, 195, 247, 0.3);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: translateY(20px);
  pointer-events: none;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.back-to-top.visible {
  opacity: 1; transform: translateY(0); pointer-events: auto;
}
.back-to-top:hover {
  background: rgba(79, 195, 247, 0.3);
  border-color: var(--accent);
  box-shadow: 0 6px 24px rgba(79, 195, 247, 0.4);
  transform: translateY(-3px);
}
.back-to-top svg {
  width: 20px; height: 20px; stroke: var(--accent); fill: none; stroke-width: 2.5;
}

/* ===== 移动端适配 ===== */
@media (max-width: 768px) {
  .search-sort-row { flex-direction: column; gap: 10px; }
  .search-wrap { max-width: 100%; }
  .sort-group { justify-content: center; width: 100%; }
  .sort-chip { padding: 7px 12px; font-size: 0.72rem; }
  .compare-modal .compare-grid { grid-template-columns: 1fr; }
  .compare-col:first-child { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .compare-bar { flex-wrap: wrap; justify-content: center; padding: 12px 16px; }
  .back-to-top { bottom: 20px; right: 16px; width: 40px; height: 40px; }
  .card-compare-check { opacity: 1; transform: scale(1); }
}

// ===== 图片代理：解决维基图片国内加载问题 =====
function proxyUrl(url) {
  if (!url || (!url.includes('wikimedia.org') && !url.includes('wikipedia.org') && !url.includes('clearbit.com'))) return url;
  // thumb.php URLs are served directly from commons and accessible in China
  if (url.includes('thumb.php')) return url;
  return 'https://wsrv.nl/?url=' + encodeURIComponent(url.replace(/^https?:\/\//, '')) + '&w=800&output=webp';
}

let collection = new Set(JSON.parse(localStorage.getItem('aviation_collection') || '[]'));
let currentFilter = 'civil';
let currentCountry = 'all';
let searchQuery = '';
let sortBy = 'speed';
let sortDir = 'asc';
let compareSet = new Set();

function getAirlineCountries() {
  const countries = new Set();
  aircrafts.forEach(a => {
    (a.airlineIds || []).forEach(aid => {
      if (airlines[aid]) countries.add(airlines[aid].country);
    });
  });
  return [...countries].sort();
}

function renderCountryBar() {
  const bar = document.getElementById('countryBar');
  const countries = getAirlineCountries();
  bar.innerHTML = '<div class="country-chip active" data-country="all">全部航司</div>' +
    countries.map(c => `<div class="country-chip" data-country="${c}">${c}</div>`).join('');

  bar.querySelectorAll('.country-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      bar.querySelectorAll('.country-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentCountry = chip.dataset.country;
      renderCards();
    });
  });
}

function matchesCountry(aircraft) {
  if (currentCountry === 'all') return true;
  if (!aircraft.airlineIds) return false;
  return aircraft.airlineIds.some(aid => airlines[aid] && airlines[aid].country === currentCountry);
}

function extractNumeric(specStr) {
  if (!specStr) return 0;
  // Handle "525–853 人" → 853, "15,200 km" → 15200, "0.85 马赫" → 0.85, "293 km/h" → 293
  const nums = specStr.match(/[\d.]+/g);
  if (!nums || nums.length === 0) return 0;
  const arr = nums.map(n => parseFloat(n.replace(/,/g, '')));
  return Math.max(...arr);
}

function getSortValue(a) {
  if (sortBy === 'speed') {
    const speedKey = a.specs['巡航速度'] || a.specs['最大速度'] || '0';
    return extractNumeric(speedKey);
  } else if (sortBy === 'range') {
    const rangeKey = a.specs['最大航程'] || a.specs['航程'] || a.specs['作战半径'] || '0';
    return extractNumeric(rangeKey);
  } else if (sortBy === 'capacity') {
    const capKey = a.specs['载客量'] || a.specs['载重'] || '0';
    return extractNumeric(capKey);
  }
  return 0;
}

function renderCards() {
  const grid = document.getElementById('grid');
  const countryBar = document.getElementById('countryBar');
  const searchHint = document.getElementById('searchHint');
  const searchClear = document.getElementById('searchClear');

  if (currentFilter === 'civil') {
    countryBar.classList.add('visible');
  } else {
    countryBar.classList.remove('visible');
  }

  let filtered = aircrafts.filter(a => currentFilter === 'all' ? true : a.category === currentFilter);

  if (currentFilter === 'civil' && currentCountry !== 'all') {
    filtered = filtered.filter(a => matchesCountry(a));
  }

  // Search filter
  if (searchQuery.trim()) {
    const q = searchQuery.trim().toLowerCase();
    filtered = filtered.filter(a =>
      a.name.toLowerCase().includes(q) ||
      a.code.toLowerCase().includes(q) ||
      a.desc.toLowerCase().includes(q)
    );
  }

  // Show/hide search clear button
  if (searchQuery.trim()) {
    searchClear.classList.add('visible');
  } else {
    searchClear.classList.remove('visible');
  }

  // Search results hint
  if (searchQuery.trim() && filtered.length === 0) {
    searchHint.style.display = 'block';
    searchHint.textContent = `未找到匹配"${searchQuery.trim()}"的飞行器`;
  } else if (searchQuery.trim()) {
    searchHint.style.display = 'block';
    searchHint.textContent = `找到 ${filtered.length} 款匹配飞行器`;
  } else {
    searchHint.style.display = 'none';
  }

  // Sort
  if (currentFilter === 'civil' && !searchQuery.trim()) {
    filtered.sort((a, b) => (b.airlineIds || []).length - (a.airlineIds || []).length);
  } else {
    filtered.sort((a, b) => {
      const va = getSortValue(a);
      const vb = getSortValue(b);
      return sortDir === 'asc' ? va - vb : vb - va;
    });
  }

  grid.innerHTML = filtered.map((a, i) => {
    const miniLogos = (a.airlineIds || []).slice(0, 3).map(aid => {
      const al = airlines[aid];
      return al ? `<img class="airline-mini-logo" src="${proxyUrl(al.logo)}" alt="${al.name}" onerror="this.style.display='none'" loading="lazy">` : '';
    }).join('');

    const isCompared = compareSet.has(a.id);

    return `
    <div class="card tilt-active" data-id="${a.id}" style="--i:${i}" onclick="openDetail(${a.id})">
      <div class="card-image-wrap">
        <div class="skeleton-img"></div>
        <img src="${proxyUrl(a.image)}" alt="${a.name}" loading="lazy"
             onload="this.classList.add('loaded'); this.previousElementSibling.classList.add('hidden')"
             onerror="placeholdImage(this,'${a.name}','${a.code}','${a.category}'); this.previousElementSibling.classList.add('hidden')">
        <div class="card-badge">${a.country}</div>
        ${miniLogos ? `<div class="card-airlines-mini">${miniLogos}</div>` : ''}
        <div class="card-compare-check ${isCompared ? 'checked' : ''}"
             onclick="event.stopPropagation(); toggleCompare(${a.id})"
             title="${isCompared ? '取消对比' : '加入对比'}">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="card-bookmark ${collection.has(a.id) ? 'collected' : ''}"
             onclick="event.stopPropagation(); toggleCollect(${a.id})">
          <svg viewBox="0 0 24 24"><path d="M5 21V5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21z"/></svg>
        </div>
      </div>
      <div class="card-body">
        <h3>${a.name}</h3>
        <div class="model-code">${a.code}</div>
        <div class="desc">${a.desc}</div>
        <div class="card-stats">
          <div class="stat"><div class="stat-value">${a.specs['巡航速度'] || a.specs['最大速度'] || '--'}</div><div class="stat-label">速度</div></div>
          <div class="stat"><div class="stat-value">${a.specs['翼展'] || a.specs['旋翼直径'] || '--'}</div><div class="stat-label">翼展</div></div>
        </div>
      </div>
    </div>`;
  }).join('');

  updateCollectionCount();
  updateCompareBar();
}

function toggleCollect(id) {
  if (collection.has(id)) { collection.delete(id); window._track('uncollect', { aircraftId: id }); }
  else { collection.add(id); window._track('collect', { aircraftId: id }); }
  localStorage.setItem('aviation_collection', JSON.stringify([...collection]));
  renderCards();
}

function updateCollectionCount() {
  document.getElementById('collectionCount').textContent = `已收藏 ${collection.size} 架`;
}
// ===== 搜索功能 =====
function clearSearch() {
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  renderCards();
}

// ===== 排序功能 =====
function updateSortUI() {
  document.querySelectorAll('.sort-chip').forEach(chip => {
    chip.classList.remove('active', 'asc', 'desc');
    if (chip.dataset.sort === sortBy) {
      chip.classList.add('active', sortDir);
    }
  });
}

// ===== 对比功能 =====
function toggleCompare(id) {
  if (compareSet.has(id)) {
    compareSet.delete(id);
  } else {
    if (compareSet.size >= 2) {
      // Remove the first one
      const first = compareSet.values().next().value;
      compareSet.delete(first);
    }
    compareSet.add(id);
  }
  updateCompareBar();
  renderCards();
}

function updateCompareBar() {
  const bar = document.getElementById('compareBar');
  const slot1 = document.getElementById('compareSlot1');
  const slot2 = document.getElementById('compareSlot2');
  const btn = document.getElementById('compareBtn');

  const ids = [...compareSet];
  if (ids.length >= 1) {
    const a1 = aircrafts.find(x => x.id === ids[0]);
    slot1.textContent = a1 ? a1.name : '选择机型 1';
    slot1.classList.add('filled');
  } else {
    slot1.textContent = '选择机型 1';
    slot1.classList.remove('filled');
  }
  if (ids.length >= 2) {
    const a2 = aircrafts.find(x => x.id === ids[1]);
    slot2.textContent = a2 ? a2.name : '选择机型 2';
    slot2.classList.add('filled');
    btn.disabled = false;
  } else {
    slot2.textContent = '选择机型 2';
    slot2.classList.remove('filled');
    btn.disabled = true;
  }

  if (compareSet.size > 0) {
    bar.classList.add('visible');
  } else {
    bar.classList.remove('visible');
  }
}

function clearCompare() {
  compareSet.clear();
  updateCompareBar();
  renderCards();
}

function showCompare() {
  const ids = [...compareSet];
  if (ids.length < 2) return;
  const a1 = aircrafts.find(x => x.id === ids[0]);
  const a2 = aircrafts.find(x => x.id === ids[1]);
  if (!a1 || !a2) return;
  window._track('compare', { id1: a1.id, id2: a2.id, name1: a1.name, name2: a2.name });

  // Determine which specs to compare (find common keys)
  const specKeys1 = Object.keys(a1.specs);
  const specKeys2 = Object.keys(a2.specs);
  // Use keys from a1 as primary
  const specRows = specKeys1.map((key, idx) => {
    const v1 = a1.specs[key];
    const v2_key = specKeys2[idx] || specKeys2.find(k => k.includes(key.slice(0,2))) || '';
    const v2 = v2_key ? a2.specs[v2_key] : '--';
    const n1 = extractNumeric(v1);
    const n2 = extractNumeric(v2);
    const better1 = n1 > n2 ? 'better' : '';
    const better2 = n2 > n1 ? 'better' : '';
    return { key, v1, v2, better1, better2 };
  });

  const specRowsHTML = specRows.map(r => `
    <div class="compare-spec-row">
      <span class="spec-value ${r.better1}">${r.v1}</span>
      <span class="spec-label">${r.key}</span>
      <span class="spec-value ${r.better2}">${r.v2}</span>
    </div>
  `).join('');

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="compare-modal">
      <div class="compare-header">
        <h2>机型对比</h2>
        <div class="modal-close" onclick="closeDetail()" style="position:static">&times;</div>
      </div>
      <div class="compare-grid">
        <div class="compare-col">
          <img class="compare-img" src="${proxyUrl(a1.image)}" alt="${a1.name}"
               onerror="placeholdImage(this,'${a1.name}','${a1.code}','${a1.category}')">
          <h3>${a1.name}</h3>
          <div class="compare-code">${a1.code} · ${a1.country}</div>
          <div class="compare-desc">${a1.desc}</div>
        </div>
        <div class="compare-col">
          <img class="compare-img" src="${proxyUrl(a2.image)}" alt="${a2.name}"
               onerror="placeholdImage(this,'${a2.name}','${a2.code}','${a2.category}')">
          <h3>${a2.name}</h3>
          <div class="compare-code">${a2.code} · ${a2.country}</div>
          <div class="compare-desc">${a2.desc}</div>
        </div>
      </div>
      <div style="padding:0 28px 28px">
        ${specRowsHTML}
      </div>
    </div>
  `;

  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeDetail(); });
  document.getElementById('overlayContainer').appendChild(overlay);
  document.body.style.overflow = 'hidden';
}

// ===== 3D 倾斜效果 =====
function initTiltEffect() {
  document.addEventListener('mousemove', (e) => {
    const cards = document.querySelectorAll('.card.tilt-active:hover');
    cards.forEach(card => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const rotateX = ((y - centerY) / centerY) * -8;
      const rotateY = ((x - centerX) / centerX) * 8;
      card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-7px) scale(1.015)`;
    });
  });

  document.addEventListener('mouseleave', (e) => {
    // Reset cards when mouse leaves document (optional, card mouseleave handles most)
  }, true);
}

// Reset individual card on mouseleave via event delegation
document.getElementById('grid').addEventListener('mouseleave', (e) => {
  const card = e.target.closest('.card.tilt-active');
  if (card) {
    card.style.transform = '';
  }
}, true);

// ===== 返回顶部 =====
function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function initBackToTop() {
  const btn = document.getElementById('backToTop');
  window.addEventListener('scroll', () => {
    if (window.scrollY > window.innerHeight) {
      btn.classList.add('visible');
    } else {
      btn.classList.remove('visible');
    }
  });
}

// ===== 初始化事件监听 =====
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  clearTimeout(window._searchDebounce);
  window._searchDebounce = setTimeout(function() {
    if (searchQuery.trim()) window._track('search', { query: searchQuery.trim() });
  }, 800);
  renderCards();
});

document.getElementById('sortGroup').addEventListener('click', (e) => {
  const chip = e.target.closest('.sort-chip');
  if (!chip) return;
  const newSort = chip.dataset.sort;
  if (sortBy === newSort) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortBy = newSort;
    sortDir = 'asc';
  }
  window._track('sort', { by: sortBy, dir: sortDir });
  updateSortUI();
  renderCards();
});

updateSortUI();
initTiltEffect();
initBackToTop();


function openDetail(id) {
  const a = aircrafts.find(x => x.id === id);
  if (!a) return;
  window._track('card_click', { aircraftId: a.id, name: a.name, code: a.code, category: a.category });

  const airlineCards = (a.airlineIds || []).map(aid => {
    const al = airlines[aid];
    if (!al) return '';
    return `
    <div class="airline-card">
      <img class="airline-logo" src="${proxyUrl(al.logo)}" alt="${al.name}"
           onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2252%22 height=%2252%22><rect fill=%22%23222%22 width=%2252%22 height=%2252%22 rx=%2214%22/><text fill=%22%23888%22 x=%2226%22 y=%2230%22 text-anchor=%22middle%22 font-size=%2210%22>${al.code}</text></svg>'">
      <div class="airline-info">
        <div class="airline-name">${al.name} <span class="airline-country-tag">${al.country}</span></div>
        <div class="airline-desc">${al.desc}</div>
        <a class="airline-website" href="${al.website}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          访问官网了解更多
        </a>
      </div>
    </div>`;
  }).join('');

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="detail-modal" style="position:relative">
      <div class="modal-header-img">
        <img src="${proxyUrl(a.image)}" alt="${a.name}"
             onerror="placeholdImage(this,'${a.name}','${a.code}','${a.category}')">
        <div class="modal-close" onclick="closeDetail()">&times;</div>
      </div>
      <div class="modal-body">
        <h2>${a.name}</h2>
        <div class="modal-code">${a.code} · ${a.country}</div>
        <div class="modal-desc">${a.desc}</div>
        <div class="modal-specs">
          ${Object.entries(a.specs).map(([k, v]) =>
            `<div class="spec-item"><div class="spec-label">${k}</div><div class="spec-value">${v}</div></div>`
          ).join('')}
        </div>
        ${airlineCards ? `<div class="airlines-section"><h3>运营航司</h3>${airlineCards}</div>` : ''}
      </div>
    </div>
  `;

  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeDetail(); });
  document.getElementById('overlayContainer').appendChild(overlay);
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('overlayContainer').innerHTML = '';
  document.body.style.overflow = '';
}

document.querySelector('.filter-bar').addEventListener('click', (e) => {
  if (!e.target.classList.contains('filter-chip')) return;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.filter;
  if (currentFilter !== 'civil') currentCountry = 'all';
  window._track('filter', { filter: currentFilter });
  renderCards();
});

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDetail(); });

function createStars() {
  const layer = document.getElementById('starsLayer');
  const frag = document.createDocumentFragment();
  for (let i = 0; i < 110; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.width = star.style.height = (Math.random() * 2.2 + 0.8) + 'px';
    star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
    star.style.setProperty('--delay', Math.random() * 5 + 's');
    frag.appendChild(star);
  }
  layer.appendChild(frag);
}

function showToast() {
  const toast = document.getElementById('announceToast');
  setTimeout(() => toast.classList.add('show'), 400);
  setTimeout(() => dismissToast(), 6000);
}
function dismissToast() {
  document.getElementById('announceToast').classList.remove('show');
}
showToast();
createStars();
renderCountryBar();
renderCards();

// ===== 埋点系统 =====
(function() {
  const STORAGE_KEY = 'aviation_analytics';
  const VISITOR_KEY = 'aviation_visitor_id';

  function getVisitorId() {
    let vid = localStorage.getItem(VISITOR_KEY);
    if (!vid) {
      vid = 'v_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
      localStorage.setItem(VISITOR_KEY, vid);
    }
    return vid;
  }
  const visitorId = getVisitorId();

  function getData() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"events":[]}');
    } catch (e) {
      return { events: [] };
    }
  }

  function saveData(data) {
    try {
      if (data.events.length > 5000) {
        data.events = data.events.slice(-4000);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {}
  }

  window._track = function(eventType, payload) {
    var data = getData();
    var ua = navigator.userAgent;
    var isMobile = /Mobile|Android|iPhone|iPad/i.test(ua);
    var browser = 'Other';
    if (ua.indexOf('Chrome') > -1 && ua.indexOf('Edg') === -1) browser = 'Chrome';
    else if (ua.indexOf('Safari') > -1 && ua.indexOf('Chrome') === -1) browser = 'Safari';
    else if (ua.indexOf('Firefox') > -1) browser = 'Firefox';
    else if (ua.indexOf('Edg') > -1) browser = 'Edge';

    var event = {
      type: eventType,
      timestamp: Date.now(),
      visitorId: visitorId,
      screen: screen.width + 'x' + screen.height,
      browser: browser,
      isMobile: isMobile
    };
    for (var k in payload) { event[k] = payload[k]; }
    data.events.push(event);
    saveData(data);
  };

  // PV
  window._track('pv', { page: 'aviation-collection', title: document.title });
})();
</script>
