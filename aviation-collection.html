<style>
:root {
  --glass-bg: rgba(255, 255, 255, 0.07);
  --glass-border: rgba(255, 255, 255, 0.13);
  --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
  --accent: #4fc3f7;
  --accent-glow: rgba(79, 195, 247, 0.45);
  --text: #e0e0e0;
  --text-dim: #9e9e9e;
  --card-hover-bg: rgba(255, 255, 255, 0.11);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: linear-gradient(160deg, #0a1220 0%, #0e1a2e 35%, #162840 65%, #0c1628 100%);
  background-attachment: fixed;
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
}

.stars-layer {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.star {
  position: absolute; background: white; border-radius: 50%;
  animation: twinkle var(--dur) ease-in-out infinite;
  animation-delay: var(--delay);
}
@keyframes twinkle {
  0%, 100% { opacity: 0.15; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.9); }
}

.app-container {
  position: relative; z-index: 1;
  max-width: 1340px; margin: 0 auto; padding: 36px 20px 60px;
}

.header {
  backdrop-filter: blur(22px) saturate(180%);
  -webkit-backdrop-filter: blur(22px) saturate(180%);

  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 40px 40px 32px;
  margin-bottom: 32px;
  box-shadow: var(--glass-shadow);

  animation: headerSlideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes headerSlideIn {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}
.header h1 {
  font-size: 2.8rem; font-weight: 700;
  background: linear-gradient(135deg, #e3f2fd, #81d4fa, #e3f2fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;

}
.header .subtitle {
  color: var(--text-dim); font-size: 0.9rem;
  letter-spacing: 5px; text-transform: uppercase;
}
.filter-bar {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-bottom: 14px; justify-content: center; align-items: center;
}
.filter-chip {
  backdrop-filter: blur(10px) saturate(180%);
  -webkit-backdrop-filter: blur(10px) saturate(180%);
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 50px;
  padding: 9px 22px;
  color: var(--text); cursor: pointer; font-size: 0.88rem;

}
.filter-chip:hover {

}
.filter-chip.active {

.airline-country-bar {

}
.airline-country-bar.visible { display: flex; }
@keyframes fadeDown {

  to { opacity: 1; transform: translateY(0); }
}
.country-chip {

}

.collection-count {

  border-radius: 50px;
  padding: 9px 22px;
  color: var(--text-dim); font-size: 0.88rem;
  margin-left: auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 26px;
}

.card {
  backdrop-filter: blur(18px) saturate(180%);
  -webkit-backdrop-filter: blur(18px) saturate(180%);
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  overflow: hidden; cursor: pointer;
  transition: all 0.45s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
  animation: cardFadeIn 0.6s ease backwards;
  animation-delay: calc(var(--i) * 0.07s);
  display: flex; flex-direction: column;
}
@keyframes cardFadeIn {
  from { opacity: 0; transform: translateY(36px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.card:hover {

  background: var(--card-hover-bg);
  border-color: rgba(255,255,255,0.32);
  box-shadow: 0 14px 44px rgba(0, 0, 0, 0.4), 0 0 28px var(--accent-glow);
}
.card:active { transform: scale(0.97); }

.card-image-wrap {
  position: relative; width: 100%; height: 200px; overflow: hidden;
  background: linear-gradient(180deg, rgba(10,18,36,0.3), rgba(10,18,36,0.85));
}
.card-image-wrap img {

}

.card-image-wrap::after {

.card-airlines-mini {

}
.airline-mini-logo {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.3);
  backdrop-filter: blur(6px);
  background: rgba(0,0,0,0.4);
  object-fit: contain; padding: 2px;
}

.card-badge {
  position: absolute; top: 12px; right: 12px;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 3px 12px;
  font-size: 0.73rem; color: #ffd54f;
  letter-spacing: 1px; font-weight: 600; z-index: 2;
}
.card-bookmark {
  position: absolute; top: 12px; left: 12px; z-index: 3;
  width: 34px; height: 34px;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.3s ease;
}
.card-bookmark.collected {
  background: rgba(255, 87, 34, 0.55);
  border-color: #ff5722;
  box-shadow: 0 0 14px rgba(255, 87, 34, 0.5);
}
.card-bookmark svg { width: 17px; height: 17px; fill: none; stroke: white; stroke-width: 2; }
.card-bookmark.collected svg { fill: #ff5722; stroke: #ff5722; }

.card-body { padding: 18px 20px 20px; flex: 1; display: flex; flex-direction: column; }
.card-body h3 {
  font-size: 1.25rem; font-weight: 700; margin-bottom: 4px;
  color: #fff; letter-spacing: 0.5px;
}
.card-body .model-code {
  font-size: 0.78rem; color: var(--accent); font-weight: 600;
  letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase;
}
.card-body .desc {
  font-size: 0.85rem; color: var(--text-dim); line-height: 1.55; flex: 1;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-stats {
  display: flex; gap: 16px; margin-top: 12px; padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.card-stats .stat { flex: 1; text-align: center; }
.stat-value { font-size: 0.95rem; font-weight: 700; color: #fff; }
.stat-label { font-size: 0.68rem; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }

.overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  display: flex; align-items: center; justify-content: center;
  animation: overlayIn 0.28s ease;
}
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
.detail-modal {
  backdrop-filter: blur(26px) saturate(180%);
  -webkit-backdrop-filter: blur(26px) saturate(180%);
  background: rgba(18, 28, 46, 0.78);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  width: 92%; max-width: 760px; max-height: 88vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 40px var(--accent-glow);
  animation: modalSlideIn 0.45s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes modalSlideIn {
  from { opacity: 0; transform: translateY(36px) scale(0.92); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-header-img { position: relative; }
.modal-header-img img {
  width: 100%; height: 260px; object-fit: cover;
  border-radius: 28px 28px 0 0;
}
.modal-close {
  position: absolute; top: 16px; right: 16px;
  width: 38px; height: 38px;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 50%;
  color: white; font-size: 1.2rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s ease; z-index: 2;
}
.modal-close:hover { background: rgba(255,255,255,0.18); transform: rotate(90deg); }
.modal-body { padding: 26px 30px 34px; }
.modal-body h2 { font-size: 1.7rem; color: #fff; margin-bottom: 3px; }
.modal-code { color: var(--accent); font-size: 0.82rem; letter-spacing: 2px; margin-bottom: 14px; }
.modal-desc { color: #ccc; line-height: 1.75; font-size: 0.93rem; margin-bottom: 20px; }
.modal-specs {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px;
}
.spec-item {
  backdrop-filter: blur(8px);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 13px;
  padding: 12px 16px;
}
.spec-label { font-size: 0.68rem; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
.spec-value { font-size: 1.05rem; color: #fff; font-weight: 700; margin-top: 2px; }

.airlines-section { margin-top: 4px; }
.airlines-section h3 {
  font-size: 1rem; color: var(--accent); margin-bottom: 14px;
  letter-spacing: 1px; display: flex; align-items: center; gap: 8px;
}
.airlines-section h3::after {
  content: ''; flex: 1; height: 1px;
  background: rgba(255,255,255,0.08);
}
.airline-card {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px;
  padding: 16px 18px; margin-bottom: 12px;
  display: flex; gap: 16px; align-items: flex-start;
  transition: all 0.3s ease;
}
.airline-card:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.18);
}
.airline-card:last-child { margin-bottom: 0; }
.airline-logo {
  width: 52px; height: 52px; border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.12);
  object-fit: contain; padding: 4px;
  background: rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.airline-info { flex: 1; min-width: 0; }
.airline-name {
  font-size: 1rem; font-weight: 700; color: #fff;
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 4px;
}
.airline-country-tag {
  font-size: 0.7rem; font-weight: 500;
  background: rgba(79, 195, 247, 0.15);
  color: var(--accent);
  border-radius: 10px;
  padding: 2px 10px;
}
.airline-desc {
  font-size: 0.82rem; color: var(--text-dim); line-height: 1.5;
  margin-bottom: 10px;
}
.airline-website {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.8rem; color: var(--accent);
  text-decoration: none;
  backdrop-filter: blur(6px);
  background: rgba(79, 195, 247, 0.1);
  border: 1px solid rgba(79, 195, 247, 0.25);
  border-radius: 20px;
  padding: 6px 16px;
  transition: all 0.3s ease;
  cursor: pointer;
}
.airline-website:hover {
  background: rgba(79, 195, 247, 0.22);
  border-color: var(--accent);
  box-shadow: 0 0 16px var(--accent-glow);
  transform: translateY(-1px);
}
.airline-website svg { width: 13px; height: 13px; }

@media (max-width: 768px) {
  .header { padding: 28px 18px; }
  .header h1 { font-size: 1.9rem; }
  .grid { grid-template-columns: 1fr; gap: 18px; }
  .detail-modal { width: 96%; max-height: 92vh; }
  .modal-specs { grid-template-columns: 1fr; }
  .airline-card { flex-direction: column; align-items: center; text-align: center; }
  .airline-logo { width: 44px; height: 44px; }
}
.announcement-toast {
  position: fixed; top: -80px; left: 50%; transform: translateX(-50%); z-index: 200;
  backdrop-filter: blur(16px) saturate(180%);
  -webkit-backdrop-filter: blur(16px) saturate(180%);
  background: rgba(79, 195, 247, 0.18);
  border: 1px solid rgba(79, 195, 247, 0.35);
  border-radius: 16px;
  padding: 14px 28px;
  color: #fff; font-size: 0.9rem; font-weight: 600;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 20px rgba(79, 195, 247, 0.3);
  display: flex; align-items: center; gap: 10px;
  transition: top 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  white-space: nowrap;
}
.announcement-toast.show { top: 24px; }
.announcement-toast .toast-icon {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(79, 195, 247, 0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
}
.announcement-toast .toast-close {
  margin-left: 8px; cursor: pointer;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; border: none; color: #fff;
  transition: background 0.3s;
}
.announcement-toast .toast-close:hover { background: rgba(255,255,255,0.25); }

/* ===== 搜索栏 ===== */
.search-sort-row {
  display: flex; gap: 12px; flex-wrap: wrap;
  margin-bottom: 16px; align-items: center; justify-content: center;
}
.search-wrap {
  position: relative; flex: 1; min-width: 220px; max-width: 400px;
}
.search-wrap svg {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  width: 17px; height: 17px; stroke: var(--text-dim); fill: none; stroke-width: 2;
  pointer-events: none; transition: stroke 0.3s;
}
.search-input {
  width: 100%; padding: 11px 18px 11px 44px;
  backdrop-filter: blur(12px) saturate(180%);
  -webkit-backdrop-filter: blur(12px) saturate(180%);
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 50px;
  color: #fff; font-size: 0.88rem; outline: none;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  font-family: inherit;
}
.search-input::placeholder { color: var(--text-dim); }
.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 22px var(--accent-glow);
  background: rgba(255,255,255,0.11);
}
.search-input:focus + svg,
.search-wrap:focus-within svg { stroke: var(--accent); }
.search-clear {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(255,255,255,0.1); border: none; color: var(--text-dim);
  cursor: pointer; font-size: 0.8rem; display: none;
  align-items: center; justify-content: center; transition: all 0.3s;
}
.search-clear.visible { display: flex; }
.search-clear:hover { background: rgba(255,255,255,0.2); color: #fff; }
.search-results-hint {
  color: var(--text-dim); font-size: 0.78rem; text-align: center;
  margin-bottom: 14px; display: none;
}

/* ===== 排序按钮组 ===== */
.sort-group {
  display: flex; gap: 6px; flex-shrink: 0;
}
.sort-chip {
  backdrop-filter: blur(10px) saturate(180%);
  -webkit-backdrop-filter: blur(10px) saturate(180%);
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 50px;
  padding: 8px 16px;
  color: var(--text-dim); cursor: pointer; font-size: 0.78rem;
  transition: all 0.3s ease; user-select: none; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}
.sort-chip:hover { color: #fff; border-color: rgba(255,255,255,0.3); }
.sort-chip.active {
  background: rgba(79, 195, 247, 0.18);
  border-color: var(--accent); color: var(--accent);
}
.sort-arrow { font-size: 0.65rem; transition: transform 0.3s; display: inline-block; }
.sort-chip.desc .sort-arrow { transform: rotate(180deg); }

/* ===== 卡片对比复选框 ===== */
.card-compare-check {
  position: absolute; top: 12px; right: 52px; z-index: 3;
  width: 28px; height: 28px;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.4);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.3s ease; opacity: 0; transform: scale(0.8);
}
.card:hover .card-compare-check,
.card-compare-check.checked { opacity: 1; transform: scale(1); }
.card-compare-check.checked {
  background: rgba(79, 195, 247, 0.3);
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--accent-glow);
}
.card-compare-check svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2.5; }
.card-compare-check.checked svg { fill: var(--accent); stroke: var(--accent); }

/* ===== 对比面板 ===== */
.compare-bar {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 90;
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  background: rgba(18, 28, 46, 0.85);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 14px 24px;
  display: none; align-items: center; gap: 16px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 24px var(--accent-glow);
  animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
.compare-bar.visible { display: flex; }
@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.compare-bar .compare-slot {
  backdrop-filter: blur(8px);

.skeleton-img::after {

}

  100% { transform: translateX(100%); }

.card-image-wrap img.loaded { opacity: 1; }

  transform-style: preserve-3d;
  perspective: 800px;
}
.card.tilt-active:hover { transform: none; }
.card.tilt-active .card-image-wrap,
.card.tilt-active .card-body {

.back-to-top {

  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.back-to-top.visible {

}
.back-to-top:hover {

.back-to-top svg {

function applyLanguage() {

  document.getElementById('headerTitle').textContent = t('headerTitle');
  document.getElementById('headerSubtitle').textContent = t('headerSubtitle');
  document.getElementById('searchInputPH').setAttribute('placeholder', t('searchPlaceholder'));
  document.getElementById('backToTop').setAttribute('title', t('backToTop'));

  // Filter chips
  ['filterCivil','filterFighter','filterBomber','filterTransport','filterHelicopter','filterAll'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = t(id);
  });

  // Sort chips
  ['sortSpeed','sortRange','sortCap'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = t(id);
  });

  // Country "all" chip
  const countryAllChip = document.getElementById('countryAllChip');
  if (countryAllChip) countryAllChip.textContent = t('countryAll');

  // Compare bar default placeholders
  const slot1 = document.getElementById('compareSlot1');
  const slot2 = document.getElementById('compareSlot2');
  if (slot1 && slot1.dataset.current === undefined) slot1.textContent = t('selectAircraft1');
  if (slot2 && slot2.dataset.current === undefined) slot2.textContent = t('selectAircraft2');
  const compareBtn = document.getElementById('compareBtn');
  if (compareBtn) compareBtn.textContent = t('startCompare');
  const clearBtn = document.getElementById('clearCompareBtn');
  if (clearBtn) clearBtn.textContent = t('clearCompare');

  // Toast
  const toastMsg = document.getElementById('toastMsg');
  if (toastMsg) toastMsg.textContent = t('announcement');

  // Re-render dynamic UI
  renderCountryBar();
  renderCards();
  updateSortUI();
}

// ===== SVG 精美占位图生成 =====
function placeholdImage(img, name, code, category) {
  const colors = {
    civil: ['#0d47a1', '#1565c0', '#42a5f5'],
    fighter: ['#1a237e', '#283593', '#5c6bc0'],
    bomber: ['#263238', '#37474f', '#607d8b'],
    transport: ['#1b5e20', '#2e7d32', '#66bb6a'],
    helicopter: ['#4a148c', '#6a1b9a', '#ab47bc']

  const c = colors[category] || colors.civil;
  const w = 800, h = 400;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="${c[0]}"/>
        <stop offset="100%" stop-color="${c[1]}"/>
      </linearGradient>
      <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
        <stop offset="50%" stop-color="rgba(255,255,255,0.02)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.08)"/>
      </linearGradient>
      <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <rect width="${w}" height="${h}" fill="url(#bg)"/>
    <rect width="${w}" height="${h}" fill="url(#shine)"/>
    <circle cx="${w*0.15}" cy="${h*0.25}" r="${w*0.25}" fill="rgba(255,255,255,0.03)"/>
    <circle cx="${w*0.82}" cy="${h*0.72}" r="${w*0.18}" fill="rgba(255,255,255,0.03)"/>
    <circle cx="${w*0.5}" cy="${h*0.5}" r="${w*0.35}" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <g transform="translate(${w/2},${h*0.42})" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="0" cy="0" rx="140" ry="14" fill="rgba(255,255,255,0.06)"/>
      <line x1="-130" y1="0" x2="130" y2="0"/>
      <line x1="-20" y1="0" x2="-120" y2="-60"/>
      <line x1="-20" y1="0" x2="-120" y2="60"/>
      <line x1="20" y1="0" x2="110" y2="-45"/>
      <line x1="20" y1="0" x2="110" y2="45"/>
      <line x1="100" y1="0" x2="140" y2="-35"/>
      <line x1="100" y1="0" x2="140" y2="35"/>
      <circle cx="-80" cy="-35" r="8" fill="rgba(255,255,255,0.1)"/>
      <circle cx="-80" cy="35" r="8" fill="rgba(255,255,255,0.1)"/>
      <circle cx="70" cy="-25" r="8" fill="rgba(255,255,255,0.1)"/>
      <circle cx="70" cy="25" r="8" fill="rgba(255,255,255,0.1)"/>
    </g>
    <text x="${w/2}" y="${h*0.72}" text-anchor="middle" fill="white" font-family="-apple-system,'PingFang SC',sans-serif" font-size="36" font-weight="700" letter-spacing="3" filter="url(#glow)">${name}</text>
    <text x="${w/2}" y="${h*0.72+42}" text-anchor="middle" fill="${c[2]}" font-family="-apple-system,'PingFang SC',sans-serif" font-size="18" font-weight="600" letter-spacing="5">${code.toUpperCase()}</text>

  </svg>`;
  img.src = 'data:image/svg+xml,' + encodeURIComponent(svg);
}

// ===== 图片代理：解决维基图片国内加载问题 =====
function proxyUrl(url) {
  if (!url || (!url.includes('wikimedia.org') && !url.includes('wikipedia.org') && !url.includes('clearbit.com'))) return url;
  // thumb.php URLs are served directly from commons and accessible in China
  if (url.includes('thumb.php')) return url;
  return 'https://wsrv.nl/?url=' + encodeURIComponent(url.replace(/^https?:\/\//, '')) + '&w=800&output=webp';
}

let collection = new Set(JSON.parse(localStorage.getItem('aviation_collection') || '[]'));
let currentFilter = 'civil';
let currentCountry = 'all';
let searchQuery = '';
let sortBy = 'speed';
let sortDir = 'asc';
let compareSet = new Set();

function getAirlineCountries() {
  const countries = new Set();
  aircrafts.forEach(a => {
    (a.airlineIds || []).forEach(aid => {
      if (airlines[aid]) countries.add(airlines[aid].country);
    });
  });
  return [...countries].sort();
}

const _countryNameMap = {
  '美国': 'US', '中国': 'CN', '日本': 'JP', '德国': 'DE', '英国': 'GB',
  '法国': 'FR', '阿联酋': 'AE', '新加坡': 'SG', '卡塔尔': 'QA',
  '中国香港': 'HK', '芬兰': 'FI', '土耳其': 'TR', '欧洲': 'EU',
  '巴西': 'BR', '加拿大/欧洲': 'CA'
};
function translateCountry(cn) { const k = _countryNameMap[cn]; return k ? t('country_'+k) : cn; }

function renderCountryBar() {
  const bar = document.getElementById('countryBar');
  const countries = getAirlineCountries();
  bar.innerHTML = '<div class="country-chip active" data-country="all" id="countryAllChip">'+t('countryAll')+'</div>' +
    countries.map(c => '<div class="country-chip" data-country="'+c+'">'+translateCountry(c)+'</div>').join('');

  bar.querySelectorAll('.country-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      bar.querySelectorAll('.country-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentCountry = chip.dataset.country;
      renderCards();
    });
  });
}

function matchesCountry(aircraft) {
  if (currentCountry === 'all') return true;
  if (!aircraft.airlineIds) return false;
  return aircraft.airlineIds.some(aid => airlines[aid] && airlines[aid].country === currentCountry);
}

function extractNumeric(specStr) {
  if (!specStr) return 0;
  // Handle "525–853 人" → 853, "15,200 km" → 15200, "0.85 马赫" → 0.85, "293 km/h" → 293
  const nums = specStr.match(/[\d.]+/g);
  if (!nums || nums.length === 0) return 0;
  const arr = nums.map(n => parseFloat(n.replace(/,/g, '')));
  return Math.max(...arr);
}

function getSortValue(a) {
  if (sortBy === 'speed') {
    const speedKey = a.specs['cruise_speed'] || a.specs['max_speed'] || '0';
    return extractNumeric(speedKey);
  } else if (sortBy === 'range') {
    const rangeKey = a.specs['max_range'] || a.specs['range'] || a.specs['combat_radius'] || '0';
    return extractNumeric(rangeKey);
  } else if (sortBy === 'capacity') {
    const capKey = a.specs['capacity'] || a.specs['payload'] || '0';
    return extractNumeric(capKey);
  }
  return 0;
}

function renderCards() {
  const grid = document.getElementById('grid');
  const countryBar = document.getElementById('countryBar');
  const searchHint = document.getElementById('searchHint');
  const searchClear = document.getElementById('searchClear');

  if (currentFilter === 'civil') {
    countryBar.classList.add('visible');
  } else {
    countryBar.classList.remove('visible');
  }

  let filtered = aircrafts.filter(a => currentFilter === 'all' ? true : a.category === currentFilter);

  if (currentFilter === 'civil' && currentCountry !== 'all') {
    filtered = filtered.filter(a => matchesCountry(a));
  }

  // Search filter
  if (searchQuery.trim()) {
    const q = searchQuery.trim().toLowerCase();
    filtered = filtered.filter(a =>
      t(a.name).toLowerCase().includes(q) ||
      a.code.toLowerCase().includes(q) ||
      t(a.desc).toLowerCase().includes(q)
    );
  }

  // Show/hide search clear button
  if (searchQuery.trim()) {
    searchClear.classList.add('visible');
  } else {
    searchClear.classList.remove('visible');
  }

  // Search results hint
  if (searchQuery.trim() && filtered.length === 0) {
    searchHint.style.display = 'block';
    searchHint.textContent = currentLang === 'zh' ? `未找到匹配"${searchQuery.trim()}"的飞行器` : `No aircraft matching "${searchQuery.trim()}" found`;
  } else if (searchQuery.trim()) {
    searchHint.style.display = 'block';
    searchHint.textContent = currentLang === 'zh' ? `找到 ${filtered.length} 款匹配飞行器` : `Found ${filtered.length} matching aircraft`;
  } else {
    searchHint.style.display = 'none';
  }

  // Sort
  if (currentFilter === 'civil' && !searchQuery.trim()) {
    filtered.sort((a, b) => (b.airlineIds || []).length - (a.airlineIds || []).length);
  } else {
    filtered.sort((a, b) => {
      const va = getSortValue(a);
      const vb = getSortValue(b);
      return sortDir === 'asc' ? va - vb : vb - va;
    });
  }

  // Build card HTML items array (no DOM write yet)
  const items = filtered.map((a, i) => {
    const isCompared = compareSet.has(a.id);
    return `
    <div class="card tilt-active" data-id="${a.id}" style="--i:${i}" onclick="openDetail(${a.id})">
      <div class="card-image-wrap">
        <div class="skeleton-img"></div>
        <img src="${proxyUrl(a.image)}" alt="${t(a.name)}" loading="lazy"
             onload="this.classList.add('loaded'); this.previousElementSibling.classList.add('hidden')"
             onerror="placeholdImage(this,'${t(a.name)}','${a.code}','${a.category}'); this.previousElementSibling.classList.add('hidden')">
        <div class="card-badge">${a.country}</div>
        <div class="card-compare-check ${isCompared ? 'checked' : ''}"
             onclick="event.stopPropagation(); toggleCompare(${a.id})"
             title="${isCompared ? t('cancelCompare') : t('addCompare')}">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="card-bookmark ${collection.has(a.id) ? 'collected' : ''}"
             onclick="event.stopPropagation(); toggleCollect(${a.id})">
          <svg viewBox="0 0 24 24"><path d="M5 21V5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21z"/></svg>
        </div>
      </div>
      <div class="card-body">
        <h3>${t(a.name)}</h3>
        <div class="model-code">${a.code}</div>
        <div class="desc">${t(a.desc)}</div>
        <div class="card-stats">
          <div class="stat"><div class="stat-value">${a.specs['cruise_speed'] || a.specs['max_speed'] || '--'}</div><div class="stat-label">${t('sortSpeed')}</div></div>
          <div class="stat"><div class="stat-value">${a.specs['wingspan'] || a.specs['rotor_diameter'] || '--'}</div><div class="stat-label">${t('specWingspan')}</div></div>
        </div>
      </div>
    </div>`;
  });

  // Batch progressive rendering: 6 cards per frame to avoid main-thread jank
  const BATCH_SIZE = 6;
  grid.innerHTML = '';
  updateCollectionCount();
  updateCompareBar();

  if (items.length === 0) return;

  let batchIndex = 0;
  function renderBatch() {
    const start = batchIndex * BATCH_SIZE;
    const end = Math.min(start + BATCH_SIZE, items.length);
    if (start >= items.length) return;
    grid.insertAdjacentHTML('beforeend', items.slice(start, end).join(''));
    batchIndex++;
    if (batchIndex * BATCH_SIZE < items.length) {
      requestAnimationFrame(function () { setTimeout(renderBatch, 0); });
    }
  }
  requestAnimationFrame(function () { setTimeout(renderBatch, 0); });
}

function toggleCollect(id) {
  if (collection.has(id)) { collection.delete(id); window._track('uncollect', { aircraftId: id }); }
  else { collection.add(id); window._track('collect', { aircraftId: id }); }
  localStorage.setItem('aviation_collection', JSON.stringify([...collection]));
  renderCards();
}

function toggleCompare(id) {
  if (compareSet.has(id)) {
    compareSet.delete(id);
  } else {
    if (compareSet.size >= 2) {
      // Remove the first one
      const first = compareSet.values().next().value;
      compareSet.delete(first);
    }
    compareSet.add(id);
  }
  updateCompareBar();
  renderCards();
}

function updateCompareBar() {
  const bar = document.getElementById('compareBar');
  const slot1 = document.getElementById('compareSlot1');
  const slot2 = document.getElementById('compareSlot2');
  const btn = document.getElementById('compareBtn');

  const ids = [...compareSet];
  if (ids.length >= 1) {
    const a1 = aircrafts.find(x => x.id === ids[0]);
    slot1.textContent = a1 ? t(a1.name) : t('selectSlot1');
    slot1.classList.add('filled');
  } else {
    slot1.textContent = t('selectSlot1');
    slot1.classList.remove('filled');
  }
  if (ids.length >= 2) {
    const a2 = aircrafts.find(x => x.id === ids[1]);
    slot2.textContent = a2 ? t(a2.name) : t('selectSlot2');
    slot2.classList.add('filled');
    btn.disabled = false;
  } else {
    slot2.textContent = t('selectSlot2');
    slot2.classList.remove('filled');
    btn.disabled = true;
  }

  if (compareSet.size > 0) {
    bar.classList.add('visible');
  } else {
    bar.classList.remove('visible');
  }
}

function clearCompare() {
  compareSet.clear();
  updateCompareBar();
  renderCards();
}

function showCompare() {
  const ids = [...compareSet];
  if (ids.length < 2) return;
  const a1 = aircrafts.find(x => x.id === ids[0]);
  const a2 = aircrafts.find(x => x.id === ids[1]);
  if (!a1 || !a2) return;
  window._track('compare', { id1: a1.id, id2: a2.id, name1: t(a1.name), name2: t(a2.name) });

  // Determine which specs to compare (find common keys)
  const specKeys1 = Object.keys(a1.specs);
  const specKeys2 = Object.keys(a2.specs);
  // Use keys from a1 as primary
  const specRows = specKeys1.map((key, idx) => {
    const v1 = a1.specs[key];
    const v2_key = specKeys2[idx] || specKeys2.find(k => k.includes(key.slice(0,2))) || '';
    const v2 = v2_key ? a2.specs[v2_key] : '--';
    const n1 = extractNumeric(v1);
    const n2 = extractNumeric(v2);
    const better1 = n1 > n2 ? 'better' : '';
    const better2 = n2 > n1 ? 'better' : '';
    return { key, v1, v2, better1, better2 };
  });

  const specRowsHTML = specRows.map(r => `
    <div class="compare-spec-row">
      <span class="spec-value ${r.better1}">${r.v1}</span>
      <span class="spec-label">${specLabel(r.key)}</span>
      <span class="spec-value ${r.better2}">${r.v2}</span>
    </div>
  `).join('');

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="compare-modal">
      <div class="compare-header">
        <h2>${t('compareTitle')}</h2>
        <div class="modal-close" onclick="closeDetail()" style="position:static">&times;</div>
      </div>
      <div class="compare-grid">
        <div class="compare-col">
          <img class="compare-img" src="${proxyUrl(a1.image)}" alt="${t(a1.name)}"
               onerror="placeholdImage(this,'${t(a1.name)}','${a1.code}','${a1.category}')">
          <h3>${t(a1.name)}</h3>
          <div class="compare-code">${a1.code} · ${a1.country}</div>
          <div class="compare-desc">${t(a1.desc)}</div>
        </div>
        <div class="compare-col">
          <img class="compare-img" src="${proxyUrl(a2.image)}" alt="${t(a2.name)}"
               onerror="placeholdImage(this,'${t(a2.name)}','${a2.code}','${a2.category}')">
          <h3>${t(a2.name)}</h3>
          <div class="compare-code">${a2.code} · ${a2.country}</div>
          <div class="compare-desc">${t(a2.desc)}</div>
        </div>
      </div>
      <div style="padding:0 28px 28px">
        ${specRowsHTML}
      </div>
    </div>
  `;

  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeDetail(); });
  document.getElementById('overlayContainer').appendChild(overlay);
  document.body.style.overflow = 'hidden';
}

function initTiltEffect() {
  document.addEventListener('mousemove', (e) => {
    const cards = document.querySelectorAll('.card.tilt-active:hover');
    cards.forEach(card => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const rotateX = ((y - centerY) / centerY) * -8;
      const rotateY = ((x - centerX) / centerX) * 8;
      card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-7px) scale(1.015)`;
    });
  });

  document.addEventListener('mouseleave', (e) => {
    // Reset cards when mouse leaves document (optional, card mouseleave handles most)
  }, true);
}

// Reset individual card on mouseleave via event delegation
document.getElementById('grid').addEventListener('mouseleave', (e) => {
  const card = e.target.closest('.card.tilt-active');
  if (card) {
    card.style.transform = '';
  }
}, true);

(function() {
  const STORAGE_KEY = 'aviation_analytics';
  const VISITOR_KEY = 'aviation_visitor_id';

  function getVisitorId() {
    let vid = localStorage.getItem(VISITOR_KEY);
    if (!vid) {
      vid = 'v_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
      localStorage.setItem(VISITOR_KEY, vid);
    }
    return vid;
  }
  const visitorId = getVisitorId();

  function getData() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"events":[]}');
    } catch (e) {
      return { events: [] };
    }
  }

  function saveData(data) {
    try {
      if (data.events.length > 5000) {
        data.events = data.events.slice(-4000);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (e) {}
  }

  window._track = function(eventType, payload) {
    var data = getData();
    var ua = navigator.userAgent;
    var isMobile = /Mobile|Android|iPhone|iPad/i.test(ua);
    var browser = 'Other';
    if (ua.indexOf('Chrome') > -1 && ua.indexOf('Edg') === -1) browser = 'Chrome';
    else if (ua.indexOf('Safari') > -1 && ua.indexOf('Chrome') === -1) browser = 'Safari';
    else if (ua.indexOf('Firefox') > -1) browser = 'Firefox';
    else if (ua.indexOf('Edg') > -1) browser = 'Edge';

    var event = {
      type: eventType,
      timestamp: Date.now(),
      visitorId: visitorId,
      screen: screen.width + 'x' + screen.height,
      browser: browser,
      isMobile: isMobile
    };
    for (var k in payload) { event[k] = payload[k]; }
    data.events.push(event);
    saveData(data);
  };

  // PV
  window._track('pv', { page: 'aviation-collection', title: document.title });
})();

// ===== 分享卡片生成 =====
function generateShareCard(id) {
  var a = aircrafts.find(function(x) { return x.id === id; });
  if (!a) return;

  var colors = {
    civil: ['#0d47a1', '#1565c0', '#42a5f5'],
    fighter: ['#1a237e', '#283593', '#5c6bc0'],
    bomber: ['#263238', '#37474f', '#607d8b'],
    transport: ['#1b5e20', '#2e7d32', '#66bb6a'],
    helicopter: ['#4a148c', '#6a1b9a', '#ab47bc']
  };
  var c = colors[a.category] || colors.civil;

  var W = 1200, H = 630;
  var canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  var ctx = canvas.getContext('2d');

  // 存储原图 URL，供下载回退使用
  window._shareOriginalImage = a.image;

  // 优先从页面 DOM 中获取已渲染的卡片封面图片
  var domImg = document.querySelector('.card[data-id="' + id + '"] .card-image-wrap img');

  if (domImg && domImg.complete && domImg.naturalWidth > 0) {
    // DOM 图片已成功加载，直接绘制（canvas 会被 taint，但预览显示正常）
    drawCard(ctx, domImg, W, H, a, c);
    showSharePreview(canvas);
  } else {
    // 兜底：尝试通过 proxyUrl 加载
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
      drawCard(ctx, img, W, H, a, c);
      showSharePreview(canvas);
    };
    img.onerror = function() {
      // 使用 SVG 占位图
      var svgImg = new Image();
      svgImg.onload = function() {
        drawCard(ctx, svgImg, W, H, a, c);
        showSharePreview(canvas);
      };
      svgImg.src = createPlaceholderSVG(a, c);
    };
    img.src = proxyUrl(a.image);
  }
}

function createPlaceholderSVG(a, c) {
  var w = 800, h = 400;
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">' +
    '<defs>' +
      '<linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">' +
        '<stop offset="0%" stop-color="' + c[0] + '"/>' +
        '<stop offset="100%" stop-color="' + c[1] + '"/>' +
      '</linearGradient>' +
    '</defs>' +
    '<rect width="' + w + '" height="' + h + '" fill="url(#bg2)"/>' +
    '<ellipse cx="' + (w/2) + '" cy="' + (h*0.45) + '" rx="140" ry="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>' +
    '<line x1="' + (w/2-130) + '" y1="' + (h*0.45) + '" x2="' + (w/2+130) + '" y2="' + (h*0.45) + '" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>' +
    '<line x1="' + (w/2-20) + '" y1="' + (h*0.45) + '" x2="' + (w/2-120) + '" y2="' + (h*0.45-60) + '" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>' +
    '<line x1="' + (w/2-20) + '" y1="' + (h*0.45) + '" x2="' + (w/2-120) + '" y2="' + (h*0.45+60) + '" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>' +
    '<line x1="' + (w/2+20) + '" y1="' + (h*0.45) + '" x2="' + (w/2+110) + '" y2="' + (h*0.45-45) + '" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>' +
    '<line x1="' + (w/2+20) + '" y1="' + (h*0.45) + '" x2="' + (w/2+110) + '" y2="' + (h*0.45+45) + '" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>' +
    '<circle cx="' + (w/2-80) + '" cy="' + (h*0.45-35) + '" r="6" fill="rgba(255,255,255,0.1)"/>' +
    '<circle cx="' + (w/2+70) + '" cy="' + (h*0.45-25) + '" r="6" fill="rgba(255,255,255,0.1)"/>' +
  '</svg>';
  return 'data:image/svg+xml,' + encodeURIComponent(svg);
}

function drawCard(ctx, img, W, H, a, c) {
  var leftW = Math.floor(W * 0.45); // 540px 深色区
  var rightW = W - leftW;           // 660px 渐变文字区
  var rightPad = 60;

  // ===== 左侧：深色区块 + 真实飞机图片 =====
  var darkGrad = ctx.createLinearGradient(0, 0, 0, H);
  darkGrad.addColorStop(0, '#0d1525');
  darkGrad.addColorStop(1, '#050a16');
  ctx.fillStyle = darkGrad;
  ctx.fillRect(0, 0, leftW, H);

  // 飞机图片 — contain 完整显示不裁剪
  ctx.save();
  ctx.fillStyle = '#050a16';
  ctx.fillRect(0, 0, leftW, H);
  var imgRatio = img.width / img.height || 1.5;
  var boxRatio = leftW / H;
  var drawW, drawH, drawX, drawY;
  if (imgRatio > boxRatio) {
    drawW = leftW;
    drawH = leftW / imgRatio;
    drawX = 0;
    drawY = (H - drawH) / 2;
  } else {
    drawH = H;
    drawW = H * imgRatio;
    drawX = (leftW - drawW) / 2;
    drawY = 0;
  }
  ctx.drawImage(img, drawX, drawY, drawW, drawH);
  ctx.restore();

  // 左侧底部遮罩：让图片底部自然融入深色背景
  var fadeGrad = ctx.createLinearGradient(0, H - 120, 0, H);
  fadeGrad.addColorStop(0, 'rgba(5,10,22,0)');
  fadeGrad.addColorStop(1, 'rgba(5,10,22,0.9)');
  ctx.fillStyle = fadeGrad;
  ctx.fillRect(0, 0, leftW, H);

  // ===== 右侧：渐变背景 + 错落文字 =====
  var bgGrad = ctx.createLinearGradient(leftW, 0, W, H);
  bgGrad.addColorStop(0, c[0]);
  bgGrad.addColorStop(0.5, c[1]);
  bgGrad.addColorStop(1, c[2]);
  ctx.fillStyle = bgGrad;
  ctx.fillRect(leftW, 0, rightW, H);

  // 装饰圆
  ctx.globalAlpha = 0.04;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(W - 140, 160, 220, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(leftW + 80, H - 100, 150, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  var textX = leftW + rightPad;
  var edgeR = W - rightPad;

  // --- 顶部靠右：型号代码（小号，半透明灰） ---
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(255,255,255,0.32)';
  ctx.font = '400 15px -apple-system, "PingFang SC", "Helvetica Neue", sans-serif';
  ctx.fillText(a.code.toUpperCase(), edgeR, 80);

  // --- 中上部偏左：飞机名称（大号粗体白色） ---
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffffff';
  var nameText = t(a.name);
  var nameSize = 50;
  ctx.font = '700 ' + nameSize + 'px -apple-system, "PingFang SC", "Helvetica Neue", sans-serif';
  var nameW = ctx.measureText(nameText).width;
  if (nameW > rightW - rightPad * 2 && nameSize > 34) {
    nameSize = Math.max(34, Math.floor((rightW - rightPad * 2) / nameW * nameSize));
    ctx.font = '700 ' + nameSize + 'px -apple-system, "PingFang SC", "Helvetica Neue", sans-serif';
  }
  ctx.fillText(nameText, textX, 170);

  // --- 中间偏右：3 项核心参数（纵向排列，右侧对齐） ---
  var specs = a.specs;
  var specKeys = Object.keys(specs).slice(0, 3);
  ctx.textAlign = 'right';
  var specY0 = 260;

  specKeys.forEach(function(key, i) {
    var y = specY0 + i * 96;
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = '400 14px -apple-system, "PingFang SC", sans-serif';
    ctx.fillText(specLabel(key), edgeR - 30, y);
    ctx.fillStyle = '#ffffff';
    ctx.font = '700 32px -apple-system, "PingFang SC", sans-serif';
    ctx.fillText(specs[key], edgeR - 30, y + 36);
  });

  // --- 底部偏左：URL 次标题 ---
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.font = '400 15px -apple-system, "PingFang SC", "Helvetica Neue", sans-serif';
  ctx.fillText('henry126923.pages.dev', textX, H - 44);

  // --- 底部偏右：水印 ---
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.font = '400 13px -apple-system, "PingFang SC", sans-serif';
  ctx.fillText('aviation-collection', edgeR, H - 44);
}

function showSharePreview(canvas) {
  // 移除已有
  var existing = document.getElementById('shareOverlay');
  if (existing) existing.remove();

  var overlay = document.createElement('div');
  overlay.className = 'share-overlay';
  overlay.id = 'shareOverlay';
  overlay.innerHTML =
    '<div class="share-modal">' +
      '<div class="share-modal-header">' +
        '<h3>分享卡片预览</h3>' +
        '<div class="modal-close" onclick="closeSharePreview()" style="position:static">&times;</div>' +
      '</div>' +
      '<div class="share-preview-wrap" id="sharePreviewWrap"></div>' +
      '<div class="share-modal-actions">' +
        '<button class="share-download-btn" onclick="downloadShareCard()">下载 PNG</button>' +
        '<button class="share-close-btn" onclick="closeSharePreview()">关闭</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);
  document.body.style.overflow = 'hidden';
  document.getElementById('sharePreviewWrap').appendChild(canvas);

  // 存储 canvas 引用供下载使用
  window._shareCanvas = canvas;

  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeSharePreview(); });
}

function downloadShareCard() {
  if (!window._shareCanvas) return;
  try {
    var link = document.createElement('a');
    link.download = 'aviation-collection-share.png';
    link.href = window._shareCanvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    // Canvas 被跨域图片 taint，toDataURL 不可用，回退为打开原图
    if (window._shareOriginalImage) {
      window.open(window._shareOriginalImage, '_blank');
    } else {
      alert('无法下载：图片跨域限制。请右键预览图保存，或尝试打开原图。');
    }
  }
}

function closeSharePreview() {
  var overlay = document.getElementById('shareOverlay');
  if (overlay) overlay.remove();
  // 如果详情弹窗仍存在，保持 overflow hidden
  if (!document.getElementById('overlayContainer') || !document.getElementById('overlayContainer').children.length) {
    document.body.style.overflow = '';
  }
  window._shareCanvas = null;
}
